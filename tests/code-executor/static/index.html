<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minibox Playground Pro</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>

    <!-- Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>

    <!-- App Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-box">M</div>
                <h1>Minibox<span>Pro</span></h1>
            </div>

            <nav class="controls">
                <div class="control-group">
                    <label>Language</label>
                    <select id="language-select">
                        <option value="python">Python 3.9</option>
                        <option value="nodejs">Node.js 16</option>
                        <option value="shell">Shell (Alpine)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Memory Limit (MB)</label>
                    <input type="number" id="memory-limit" value="512" min="16" max="2048">
                </div>

                <div class="control-group">
                    <label>CPU Limit (%)</label>
                    <input type="number" id="cpu-limit" value="100" min="1" max="100">
                </div>

                <div class="spacer"></div>

                <button id="run-btn" class="primary-btn">
                    <span class="icon">▶</span> Run Code
                </button>
                <button id="stop-btn" class="secondary-btn" disabled>
                    <span class="icon">■</span> Stop
                </button>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <div class="dot green"></div>
                    <span>Daemon: Ready</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="editor-area">
            <div id="monaco-container"></div>
            
            <div class="terminal-container">
                <div class="terminal-header">
                    <span>TERMINAL</span>
                    <div id="stats-dashboard" class="stats-dashboard hidden">
                        <div class="stat-item">CPU: <span id="stat-cpu">0.0</span>%</div>
                        <div class="stat-item">MEM: <span id="stat-mem">0</span> MB</div>
                    </div>
                </div>
                <div id="xterm-container"></div>
            </div>
        </main>
    </div>

    <!-- Background Elements -->
    <div class="bg-blur blur-1"></div>
    <div class="bg-blur blur-2"></div>

    <script src="script.js"></script>
</body>
</html>
